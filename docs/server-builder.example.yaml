channels:
  - key: "welcome"
    name: "welcome"
    type: "text"
    category: "start-here"
    position: 1
    description: "Premium first-impression channel for Domus-Ursi: the House of the Bear, built for elite play, strong community culture, and organized gaming."
    topic: "Welcome to Domus-Ursi. Enter the House of the Bear, read the rules, verify, then choose your roles."
    nsfw: false
    slowmode_seconds: 0
    sync_permissions_with_category: true

  - key: "rules"
    name: "rules"
    type: "text"
