<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ThePurge Catalogue Manager</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ThePurge Catalogue Manager</h1>
        <p id="status">Loading status...</p>
      </div>
      <div class="actions">
        <a class="button secondary" href="/">Bot Control</a>
        <a class="button" href="/auth/login" id="loginButton">Discord Login</a>
        <button id="logoutButton" type="button">Logout</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Servers</h2>
        <div id="guildList" class="list"></div>
      </aside>

      <section class="workspace">
        <section class="panel">
          <div class="panel-heading">
            <h2>Jellyfin Connection</h2>
            <button id="jellyfinRefreshButton" class="secondary" type="button">Refresh</button>
          </div>
          <p id="jellyfinStatus" class="status-note"></p>
          <div id="jellyfinSummary" class="metric-grid"></div>
          <div class="grid integration-grid">
            <div>
              <h3>Libraries</h3>
              <div id="jellyfinLibraries" class="list compact-list"></div>
            </div>
            <div>
              <h3>Active Sessions</h3>
              <div id="jellyfinSessions" class="list compact-list"></div>
            </div>
          </div>
          <p id="jellyfinErrors" class="status-note muted"></p>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Catalogue Visibility</h2>
            <button id="jellyfinCatalogRefreshButton" type="button">Sync Catalogue</button>
          </div>
          <div id="jellyfinCatalogSummary" class="metric-grid"></div>
          <div class="catalog-toolbar">
            <label>Search Titles <input id="jellyfinCatalogSearch" type="search" placeholder="Filter by title, genre, year, actor"></label>
            <label class="check"><input id="jellyfinCatalogAvailableOnly" type="checkbox"> Bot access only</label>
          </div>
          <p id="jellyfinCatalogStatus" class="status-note"></p>
          <div id="jellyfinCatalogList" class="list compact-list catalog-list"></div>
          <div class="form-actions">
            <button id="jellyfinCatalogPrevButton" class="secondary" type="button">Previous</button>
            <button id="jellyfinCatalogNextButton" class="secondary" type="button">Next</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/catalogue.js"></script>
  </body>
</html>
